name: Confluence Sync
image: solivellaluis/confluence-sync
version: 1.0.0
description: >
  Syncs Markdown files with Confluence as pages.
  Supports individual files and full directory hierarchies.
  Compatible with Confluence Cloud and Data Center/Server.

tags:
  - confluence
  - documentation
  - markdown
  - docs-as-code

variables:
  - name: CONFLUENCE_URL
    description: >
      Confluence base URL.
      Cloud example: https://mycompany.atlassian.net/wiki
      Server example: https://confluence.mycompany.com
    required: true

  - name: CONFLUENCE_USER
    description: >
      User email for Confluence Cloud,
      or username for Confluence Server/Data Center.
    required: true

  - name: CONFLUENCE_API_TOKEN
    description: >
      Confluence Cloud API Token (generated at id.atlassian.com)
      or password for Confluence Server. Always use as a secret variable.
    required: true
    secret: true

  - name: CONFLUENCE_SPACE_KEY
    description: >
      Confluence space key where the documents will be published.
      Example: PROJ, DOCS, TEAM
    required: true

  - name: CONFLUENCE_PARENT_ID
    description: >
      Root parent page ID in Confluence.
      All synced files and folders will be created under this page.
      Can be obtained from the page URL in Confluence.
    required: false

  - name: FILES
    description: >
      List of .md files and/or directories to sync, space-separated.
      Directories are processed recursively, building the page hierarchy.
      Example: "README.md docs/ manual.md api-reference.md"
    required: true

  - name: DRY_RUN
    description: >
      If set to 'true', simulates the execution without creating or updating
      any Confluence page. Useful for validating configuration.
    required: false
    default: "false"
