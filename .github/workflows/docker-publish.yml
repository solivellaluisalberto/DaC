name: Docker Build and Publish

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            solivellaluis/confluence-sync:latest
            solivellaluis/confluence-sync:${{ github.run_number }}

      - name: Output image tags
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "✅ Imagen publicada:"
          echo "   solivellaluis/confluence-sync:latest"
          echo "   solivellaluis/confluence-sync:${{ github.run_number }}"

      - name: Build only (no push)
        if: github.ref != 'refs/heads/main' || github.event_name != 'push'
        run: |
          echo "🔧 Modo validación: imagen compilada pero no publicada"
